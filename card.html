    <meta charset="UTF-8" />

      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>产品认证证书</title>
    <link
      rel="stylesheet"
      href="./js/index.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: linear-gradient(135deg, #e8f0f8 0%, #f5f7fa 100%);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2vw;
      }

      #app {
        width: 100%;
        height: 100vh;
        max-width: 750px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .certificate-card {
        background: #fff;
        border-radius: 12px;
        padding: 0;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        position: relative;
        overflow: hidden;
        width: 95%;
        display: flex;
        flex-direction: column;
      }

      /* 水印层 */
      .watermark-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
        overflow: hidden;
      }

      .watermark-item {
        position: absolute;
        color: rgba(0, 0, 0, 0.04);
        font-size: 14px;
        font-weight: 500;
        transform: rotate(-45deg);
        white-space: nowrap;
        user-select: none;
      }

      /* 产品图片区域 - 顶部 */
      .product-image-wrapper {
        width: 100%;
        position: relative;
        z-index: 2;
        flex-shrink: 0;
        background: #f5f7fa;
      }

      .product-image-placeholder {
        width: 100%;
        aspect-ratio: 1 / 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .product-image-placeholder img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* 内容区域 */
      .content-area {
        padding: 1vw 4vw 4vw 4vw;
        position: relative;
        z-index: 2;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      /* 产品名称和编号 */
      .product-title-section {
        margin-bottom: 1vw;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .card-title {
        font-size: 24px;
        font-weight: 700;
        color: #2d51b5;
        margin-bottom: 1vw;
      }

      /* 新增：品牌标签样式 (位于标题右侧) */
      .brand-tag-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f5f7fa 0%, #e8f0f8 100%);
        border: 1px solid #dce3ed;
        border-radius: 6px;
        padding: 0.8vw 2vw;
        min-width: 18vw;
        box-shadow: 0 2px 6px rgba(45, 81, 181, 0.05);
      }

      .brand-tag-label {
        font-size: 10px;
        color: #909399;
        margin-bottom: 0.4vw;
        letter-spacing: 1px;
      }

      .brand-tag-value {
        font-size: 14px;
        font-weight: 700;
        color: #2d51b5;
        /* 与主标题颜色呼应 */
        letter-spacing: 1px;
      }

      .product-code {
        font-size: 12px;
        color: #c0c4cc;
      }

      /* 参数网格 - 参考图中间区域 */
      .parameters-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1vw;
        margin-bottom: 3vw;
        border-radius: 8px;
        padding-top: 3vw;
      }

      .param-card-item {
        text-align: center;
        padding: 1vw 1vw;
        background: #fff;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        border: 1px solid #f7f8fa;
      }

      .param-card-label {
        font-size: 12px;
        color: #999;
        margin-bottom: 1vw;
      }

      .param-card-value {
        font-size: 13px;
        font-weight: 600;
        color: #333;
      }

      /* 底部区域 - 二维码和品牌 */
      .card-footer {
        margin-top: auto;
        position: relative;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .qr-code-section {
        display: flex;
        align-items: center;
        gap: 3vw;
      }

      .qr-code-placeholder {
        width: 30vw;
        height: 30vw;
        background: #fff;
        border: 1px solid #f0f0f0;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        flex-shrink: 0;
      }

      .qr-code-placeholder img {
        width: 100%;
        height: 100%;
      }

      .brand-section {
        position: absolute;
        z-index: 999;
        top: 2vw;
        left: 4vw;
        display: flex;
        align-items: center;
        gap: 2vw;
      }

      .brand-logo {
        width: 20vw;
        height: 12vw;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.6;
      }

      .brand-logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .company-name {
        font-size: 14px;
        color: #999;
        font-weight: 500;
      }

      .seal-placeholder {
        width: 22vw;
        height: 22vw;
        border: 2px solid #ee0a24;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ee0a24;
        font-size: 11px;
        transform: rotate(-5deg);
        position: absolute;
        bottom: 3vw;
        right: 4vw;
        z-index: 10;
        opacity: 0.6;
      }
    </style>
  </head>
